# For physics topics, use the specific subtopics, e.g. "Astrophysics"
topic: "Computer Science"
# An empty list here will include all categories in a topic
# Use the natural language names of the topics, found here: https://arxiv.org
# Including more categories will result in more calls to the large language model
categories: ["Artificial Intelligence", "Computation and Language", "Machine Learning", "Multiagent Systems"]

# Relevance score threshold. abstracts that receive a score less than this from the large language model
# will have their papers filtered out.
#
# Must be within 1-10
threshold: 6

# A natural language statement that the large language model will use to judge which papers are relevant
#
# For example:
#     "I am interested in complexity theory papers that establish upper bounds"
#     "gas chromatography, mass spectrometry"
#     "making lots of money"
#
# This can be empty, which just return a full list of papers with no judgement or filtering,
# in whatever order arXiv responds with.
interest: |
  ## Core research proposition

  Under a fixed compute/cost budget, how should LLM-based agent systems be
  designed, orchestrated, or searched over to maximize task performance?
  Two active lines:
  (1) MCTS/tree-search-based workflow optimization for agent systems
  (2) Efficient multi-agent collaboration vs single large LLM on long-horizon tasks

  ## STRONGLY RELEVANT — score 8-10

  - Multi-agent collaboration architectures where multiple instances genuinely
    collaborate, debate, or divide labor (Du et al. debate, MoA, MacNet)
  - MCTS / tree search over agent actions or workflows (AFlow, LATS, and follow-ups);
    reward function design for agent rollouts
  - Agent memory systems that improve cross-session or cross-task efficiency
    (A-Mem, plan caching, experience replay for agents)
  - Test-time compute scaling specifically for LONG-HORIZON agentic tasks
    (trajectory-level, not single-turn BoN/CoT)
  - Automated agent workflow design / search (AFlow, GPTSwarm, ADAS, DSPy-style)
  - Cost-performance tradeoffs in agent systems: SLM vs large-LLM, token-budget
    optimization, agent-level routing

  ## ADJACENT — score 5-7 only if methodologically transferable

  - Model routing / selection (FrugalGPT, GraphRAG-Router): baseline contrast only
  - Single-agent tool-use pipelines (ReAct, Reflexion): background, not core
  - RL for LLM training (RLHF, RLAIF): relevant only if applied to agent workflows
  - Evaluation/benchmarking of agents: useful but not core unless efficiency-focused

  ## NOT MY DIRECTION — score 1-4 even if keywords match

  - Inference infrastructure: KV cache compression, speculative decoding, vLLM,
    streaming, quantization, memory reduction (infra layer, not agent layer)
  - Retrieval-augmented generation where retrieval IS the contribution (FLARE-style)
  - Single-turn inference algorithms: BoN with confidence scoring (SCATR), CoT
    variants, PAL-style program-aided reasoning — different problem setup
  - Multimodal/vision-language unless core contribution is agent orchestration
  - Robotics / embodied RL even when LLMs are involved (Eureka, Voyager)
  - Pure prompt engineering without architectural contribution
  - Model architecture papers (MoE, Mamba hybrids) unless specifically about agents
  - Pure application papers ("we applied an LLM agent to domain X")
