# For physics topics, use the specific subtopics, e.g. "Astrophysics"
topic: "Computer Science"
# An empty list here will include all categories in a topic
# Use the natural language names of the topics, found here: https://arxiv.org
# Including more categories will result in more calls to the large language model
categories: ["Artificial Intelligence", "Computation and Language", "Machine Learning", "Multiagent Systems"]

# Relevance score threshold. abstracts that receive a score less than this from the large language model
# will have their papers filtered out.
#
# Must be within 1-10
threshold: 6

# A natural language statement that the large language model will use to judge which papers are relevant
#
# For example:
#     "I am interested in complexity theory papers that establish upper bounds"
#     "gas chromatography, mass spectrometry"
#     "making lots of money"
#
# This can be empty, which just return a full list of papers with no judgement or filtering,
# in whatever order arXiv responds with.
interest: |
  My core research focus is improving the EFFICIENCY of LLM-based agent systems
  (including multi-agent systems). I want papers that optimize either a specific
  component of an agent system OR the entire pipeline end-to-end.

  Highly relevant topics:
  1. LLM agents and multi-agent systems (planning, tool use, orchestration, memory, communication)
  2. Efficiency optimization of agent systems: inference cost, latency, token usage,
     routing, caching, scheduling, compression, distillation for agents
  3. Automated agent workflow design / search (e.g. AFlow, GPTSwarm, ADAS, DSPy-style optimization)
  4. Reinforcement learning for agent / LLM training, RLHF, RLAIF, agentic RL, RL-based
     workflow optimization
  5. Evaluation and benchmarking of LLM agents (especially efficiency-aware evaluation,
     cost-quality tradeoffs)

  Also welcome (cross-domain methods that could transfer to agent efficiency):
  - System / ML system optimization techniques (speculative decoding, KV cache, batching,
     scheduling) if they plausibly apply to agent pipelines
  - Program synthesis, neural architecture search, AutoML ideas that could inspire
     automated agent design
  - Graph / combinatorial optimization methods relevant to multi-agent coordination

  Less interested in:
  - Pure application papers with no methodological contribution (e.g. "we applied an
     LLM agent to domain X")
  - Papers focused only on a specific non-English language
  - Pure theoretical papers with no connection to practical systems
